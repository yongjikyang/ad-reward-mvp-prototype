<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>돌을 깨서 보석을 얻으세요</title>
<link rel="preconnect" href="https://cdn.jsdelivr.net">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%}
body{min-height:100%;display:flex;align-items:flex-start;justify-content:center;background:#efefef;font-family:"Pretendard Variable",Pretendard,-apple-system,BlinkMacSystemFont,sans-serif;color:#fff;padding:24px 0;overflow:auto}
.phone{width:390px;height:812px;background:#141414;border-radius:44px;overflow:hidden;position:relative;box-shadow:0 24px 80px rgba(0,0,0,.28)}
.screen{position:absolute;inset:0;background:#141414;overflow:hidden}
.top-actions{position:absolute;top:24px;right:22px;display:flex;gap:8px;z-index:5}
.pill{height:32px;border:0;border-radius:8px;background:#fff;color:#111;display:flex;align-items:center;gap:4px;padding:0 10px 0 8px;font:600 12px/1 Pretendard,sans-serif;cursor:pointer}
.pill img{width:18px;height:18px;object-fit:contain}
.hero-title{position:absolute;top:116px;left:50%;transform:translateX(-50%);width:260px;text-align:center;font-size:24px;font-weight:650;letter-spacing:-.48px;white-space:nowrap}
.hero-sub{position:absolute;top:155px;left:50%;transform:translateX(-50%);font-size:14px;font-weight:400;letter-spacing:-.28px;color:rgba(255,255,255,.7);white-space:nowrap}
.progress-wrap{position:absolute;top:225px;left:40px;width:310px;height:12px;background:#2a3036;border-radius:999px;overflow:hidden}
.progress-fill{height:100%;width:50%;border-radius:999px;background:linear-gradient(90deg,#6c4fff 0%,#5e99ff 54%,#f394ff 100%);transition:width .26s cubic-bezier(.2,.8,.2,1)}
.progress-percent{position:absolute;top:245px;left:195px;transform:translateX(-50%);width:max-content;min-width:36px;text-align:center;font-size:14px;font-weight:650;color:#768a97;letter-spacing:-.28px;transition:left .26s cubic-bezier(.2,.8,.2,1)}
.progress-hammer{position:absolute;top:193px;left:184px;width:24px;height:24px;transition:left .26s,transform .18s;transform:rotate(-15deg);z-index:2}
.rock-zone{position:absolute;top:290px;left:63px;width:265px;height:275px;cursor:pointer;touch-action:manipulation}
.rock{position:absolute;left:0;top:-48px;width:265px;height:auto;transform-origin:center 70%;transition:transform .28s cubic-bezier(.2,1.3,.2,1),filter .28s}
.rock-zone:active .rock,.rock.hit{transform:scale(.94) rotate(-1deg);filter:brightness(1.08)}
.big-hammer{position:absolute;left:219px;top:386px;width:126px;height:126px;filter:drop-shadow(0 24px 14px rgba(0,0,0,.85));transform:rotate(-15deg);transform-origin:35% 70%;transition:left .2s,top .2s,transform .12s;pointer-events:none;z-index:3}
.big-hammer.hit{transform:rotate(0deg) translateY(6px)}
.gem-panel{position:absolute;left:40px;top:603px;width:310px;min-height:112px;border-radius:20px;background:#2a3036;padding:18px 20px;display:flex;flex-direction:column;align-items:center;gap:16px;z-index:4}
.gem-row-head{width:100%;height:28px;display:flex;align-items:center;justify-content:space-between;gap:10px}
.remaining{display:flex;gap:8px;align-items:center;font-size:16px;font-weight:800;letter-spacing:-.32px;white-space:nowrap}
.remaining b{color:#9fa9ff;font-weight:800}
.ad-more{height:28px;border:0;border-radius:8px;background:linear-gradient(71deg,#6c4fff 16%,#5e99ff 69%,#f394ff 106%);color:#fff;font:650 11px/1 Pretendard,sans-serif;display:none;align-items:center;gap:4px;padding:0 8px 0 6px;cursor:pointer;white-space:nowrap}
.ad-more img{width:16px;height:16px;object-fit:contain}
.gems{display:flex;gap:10px;align-items:center;height:32px}
.gem-slot{width:40px;height:32px;display:flex;align-items:flex-end;justify-content:center;opacity:1;transition:.2s}
.gem-slot.empty{opacity:.3}
.gem-slot img{width:40px;height:32px;object-fit:cover;object-position:bottom}
.ad-card{position:absolute;left:40px;top:750px;width:310px;height:332px;border-radius:20px;overflow:hidden;background:#fff;z-index:1}
.ad-card img{position:absolute;left:-24px;top:-327px;width:362px;height:auto}
.toast{position:absolute;left:50%;bottom:84px;transform:translateX(-50%) translateY(14px);padding:12px 18px;border-radius:14px;background:rgba(255,255,255,.95);color:#111;font-size:13px;font-weight:800;z-index:20;opacity:0;transition:.25s;white-space:nowrap;box-shadow:0 12px 30px rgba(0,0,0,.35)}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.overlay{position:absolute;inset:0;background:rgba(0,0,0,.6);z-index:30;display:none;align-items:center;justify-content:center;flex-direction:column}
.overlay.show{display:flex}
.popup{width:300px;height:378px;border-radius:40px;border:1px solid rgba(255,255,255,.85);background:linear-gradient(143deg,rgba(0,0,0,.72) 37%,rgba(46,39,99,.72) 90%,rgba(166,255,242,.72) 142%);box-shadow:0 0 100px rgba(140,152,255,.7);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:30px;padding:30px 24px;transform:scale(.92);animation:pop .28s cubic-bezier(.2,1.35,.3,1) forwards;position:relative;overflow:hidden}
@keyframes pop{to{transform:scale(1)}}
.popup-copy{text-align:center;font-size:24px;font-weight:650;letter-spacing:-.48px;line-height:1.2;display:flex;flex-direction:column;gap:12px;width:100%}
.reward-text{background:linear-gradient(35deg,#3e1de5 14%,#5e99ff 47%,#f394ff 70%);-webkit-background-clip:text;background-clip:text;color:transparent}
.popup-close{position:absolute;top:18px;right:18px;width:32px;height:32px;border:0;border-radius:50%;background:rgba(255,255,255,.14);color:#fff;font:500 22px/30px Pretendard,sans-serif;cursor:pointer;z-index:3;display:flex;align-items:center;justify-content:center}.diamond-wrap{position:relative;width:150px;height:148px;display:flex;align-items:center;justify-content:center;touch-action:none;cursor:grab;transform-style:preserve-3d;transition:transform .18s ease-out}.diamond-wrap.dragging{cursor:grabbing;transition:none}.diamond-wrap img{width:150px;height:148px;object-fit:contain;object-position:center 50%;filter:drop-shadow(0 0 20px rgba(159,169,255,.62));animation:diamond-glow 1.35s ease-in-out infinite}.diamond-wrap::before,.diamond-wrap::after{content:"";position:absolute;inset:0;pointer-events:none}.diamond-wrap::before{background:radial-gradient(circle at 24% 20%,rgba(255,255,255,.95) 0 2px,transparent 4px),radial-gradient(circle at 76% 24%,rgba(190,233,255,.9) 0 2px,transparent 4px),radial-gradient(circle at 36% 72%,rgba(255,198,255,.86) 0 2px,transparent 4px),radial-gradient(circle at 68% 70%,rgba(255,255,255,.88) 0 1.5px,transparent 4px);animation:diamond-twinkle 1.05s ease-in-out infinite}.diamond-wrap::after{background:radial-gradient(circle at 50% 45%,rgba(255,255,255,.42),transparent 48%);opacity:.55;animation:diamond-pulse 1.2s ease-in-out infinite}.sparkle{position:absolute;width:7px;height:7px;border-radius:50%;background:#fff;box-shadow:0 0 13px rgba(255,255,255,.98),0 0 22px rgba(180,218,255,.75);pointer-events:none;animation:sparkle-float .95s ease-out forwards;z-index:2}@keyframes diamond-glow{0%,100%{filter:drop-shadow(0 0 14px rgba(159,169,255,.5)) brightness(1)}38%{filter:drop-shadow(0 0 28px rgba(243,148,255,.82)) brightness(1.12)}68%{filter:drop-shadow(0 0 24px rgba(166,255,242,.72)) brightness(1.08)}}@keyframes diamond-twinkle{0%,100%{opacity:.34;transform:scale(.9) rotate(0deg)}35%{opacity:1;transform:scale(1.08) rotate(7deg)}70%{opacity:.72;transform:scale(.98) rotate(-5deg)}}@keyframes diamond-pulse{0%,100%{opacity:.28;transform:scale(.92)}50%{opacity:.72;transform:scale(1.12)}}@keyframes sparkle-float{to{transform:translate(var(--x),var(--y)) scale(0);opacity:0}}
.cta{position:absolute;bottom:141px;left:45px;width:300px;height:52px;border:0;border-radius:12px;background:linear-gradient(40deg,#3e1de5 13%,#5e99ff 64%,#f394ff 100%);color:#fff;font:800 16px/1 Pretendard,sans-serif;cursor:pointer;z-index:31;display:none}
.cta.show{display:block}
.particle{position:absolute;width:8px;height:8px;border-radius:50%;background:#9fa9ff;z-index:8;pointer-events:none;animation:burst .65s ease-out forwards}
@keyframes burst{to{transform:translate(var(--x),var(--y)) scale(0);opacity:0}}
.collection{position:absolute;inset:0;background:#141414;z-index:40;display:none;padding-top:24px}
.collection.show{display:block}
.close{position:absolute;top:24px;left:22px;border:0;background:rgba(255,255,255,.12);color:#fff;border-radius:10px;height:32px;padding:0 12px;font:700 12px Pretendard;cursor:pointer}
.collection h2{margin-top:78px;text-align:center;font-size:24px;letter-spacing:-.48px}
.collection p{text-align:center;margin-top:10px;color:rgba(255,255,255,.66);font-size:14px}
.collection-grid{margin:54px 32px 0;display:grid;grid-template-columns:repeat(2,1fr);gap:18px}
.collection-card{height:150px;border-radius:24px;background:#2a3036;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:10px;color:#9fa9ff;font-weight:800}
.collection-card img{width:78px;height:78px;object-fit:cover;border-radius:50%}
@media(max-width:480px){body{background:#141414}.phone{width:100vw;height:100vh;border-radius:0;box-shadow:none}.ad-card{display:none}}
</style>
</head>
<body>
<div class="phone">
  <main class="screen" id="mainScreen">
    <div class="top-actions">
      <button class="pill" id="checkinBtn"><img src="assets/figma/checkin.png" alt="">출석체크</button>
      <button class="pill" id="boxBtn"><img src="assets/figma/jewelbox.png" alt="">내 보석함</button>
    </div>
    <h1 class="hero-title">돌을 깨서 보석을 얻으세요</h1>
    <p class="hero-sub">1532명이 보석을 얻었어요</p>
    <img class="progress-hammer" id="progressHammer" src="assets/figma/hammer.png" alt="">
    <div class="progress-wrap"><div class="progress-fill" id="progressFill"></div></div>
    <div class="progress-percent" id="progressText">50%</div>
    <div class="rock-zone" id="rockZone"><img class="rock" id="rock" src="assets/figma/rock.png" alt="돌"></div>
    <img class="big-hammer" id="bigHammer" src="assets/figma/hammer.png" alt="망치">
    <section class="gem-panel">
      <div class="gem-row-head">
        <div class="remaining"><span>오늘 남은 보석</span><b id="remainText">4개</b></div>
        <button class="ad-more" id="adMore"><img src="assets/figma/hammer-figma.png?v=73c2jewel" alt="">광고 보고 더 깨기</button>
      </div>
      <div class="gems" id="gems"></div>
    </section>
    <div class="ad-card"><img src="assets/figma/ad-card.png" alt="광고 배너"></div>
  </main>
  <div class="overlay" id="overlay">
    <section class="popup">
      <button class="popup-close" id="popupClose" type="button" aria-label="닫기">×</button>
      <div class="popup-copy"><span>다이아몬드가 나왔어요!</span><span class="reward-text">+300만원</span></div>
      <div class="diamond-wrap" id="diamondWrap"><img src="assets/figma/diamond.png?v=figma-new-sparkle" alt="다이아몬드"></div>
    </section>
  </div>
  <button class="cta" id="rewardBtn">광고보고 보석 받기</button>
  <section class="collection" id="collection">
    <button class="close" id="closeCollection">← 닫기</button>
    <h2>내 보석함</h2>
    <p>오늘 얻은 보석을 확인해보세요</p>
    <div class="collection-grid">
      <div class="collection-card"><img src="assets/figma/diamond.png" alt="">다이아몬드</div>
      <div class="collection-card"><img src="assets/figma/gem-blue.png" alt="">블루젬</div>
      <div class="collection-card"><img src="assets/figma/gem-blue.png" alt="">사파이어</div>
      <div class="collection-card"><img src="assets/figma/gem-blue.png" alt="">잠금</div>
    </div>
  </section>
  <div class="toast" id="toast"></div>
</div>
<script>
const state={progress:50,remaining:4,opened:4};
const rockStages=["assets/figma/rock-stage-1.png?v=7803351","assets/figma/rock-stage-2.png?v=7803351","assets/figma/rock-stage-3.png?v=7803351","assets/figma/rock-stage-4.png?v=7803351","assets/figma/rock-stage-5.png?v=7803351"];
rockStages.forEach(src=>{const image=new Image();image.src=src});
const progressFill=document.getElementById("progressFill");
const progressText=document.getElementById("progressText");
const progressHammer=document.getElementById("progressHammer");
const rock=document.getElementById("rock");
const rockZone=document.getElementById("rockZone");
const bigHammer=document.getElementById("bigHammer");
const remainText=document.getElementById("remainText");
const gems=document.getElementById("gems");
const adMore=document.getElementById("adMore");
const overlay=document.getElementById("overlay");
const rewardBtn=document.getElementById("rewardBtn");
const popupClose=document.getElementById("popupClose");
const diamondWrap=document.getElementById("diamondWrap");
const collection=document.getElementById("collection");
const toastEl=document.getElementById("toast");
let sparkleTimer=null;
function render(){
  const progressX=40+310*state.progress/100;
  const rockStage=Math.min(5,Math.max(1,Math.floor((state.progress-50)/10)+1));
  progressFill.style.width=state.progress+"%";
  progressText.textContent=state.progress+"%";
  progressText.style.left=Math.min(350,Math.max(40,progressX))+"px";
  progressHammer.style.left=(progressX-12)+"px";
  remainText.textContent=state.remaining+"개";
  adMore.style.display=state.remaining===0?"flex":"none";
  rock.src=rockStages[rockStage-1];
  rock.alt=`돌 ${rockStage}단계`;
  rock.style.transform=`scale(${1-(state.progress-50)*.003})`;
  gems.innerHTML="";
  for(let i=0;i<5;i++){
    const slot=document.createElement("div");
    slot.className="gem-slot"+(i>=state.remaining?" empty":"");
    slot.innerHTML='<img src="assets/figma/jewel-icon@2x.png?v=2xjewel" alt="보석">';
    gems.appendChild(slot);
  }
}
function hit(e){
  const r=rockZone.getBoundingClientRect();
  const x=(e.clientX||r.left+r.width*.7)-r.left;
  const y=(e.clientY||r.top+r.height*.55)-r.top;
  bigHammer.style.left=Math.max(160,Math.min(252,r.left+x-63+70-window.innerWidth/2+195))+"px";
  bigHammer.style.top=Math.max(325,Math.min(430,290+y+36))+"px";
  bigHammer.classList.add("hit");
  rock.classList.add("hit");
  progressHammer.style.transform="rotate(0deg)";
  burst(63+x,290+y);
  state.progress=Math.min(100,state.progress+10);
  render();
  setTimeout(()=>{bigHammer.classList.remove("hit");rock.classList.remove("hit");progressHammer.style.transform="rotate(-15deg)"},140);
  if(state.progress>=100)setTimeout(openPopup,180);
}
function burst(x,y){
  for(let i=0;i<10;i++){
    const p=document.createElement("i");
    p.className="particle";
    p.style.left=x+"px";
    p.style.top=y+"px";
    p.style.setProperty("--x",Math.cos(i/10*Math.PI*2)*52+"px");
    p.style.setProperty("--y",Math.sin(i/10*Math.PI*2)*52+"px");
    document.querySelector(".phone").appendChild(p);
    setTimeout(()=>p.remove(),700);
  }
}
function openPopup(){overlay.classList.add("show");rewardBtn.classList.add("show");diamondWrap.style.transform="";startDiamondSparkles()}
function closePopup(){
  overlay.classList.remove("show");
  rewardBtn.classList.remove("show");
  stopDiamondSparkles();
  state.progress=50;
  state.remaining=Math.max(0,state.remaining-1);
  state.opened=Math.min(5,state.opened+1);
  toast("보석함에 다이아몬드를 담았어요");
  render();
}
function dismissPopup(){
  overlay.classList.remove("show");
  rewardBtn.classList.remove("show");
  stopDiamondSparkles();
  state.progress=50;
  render();
}
function startDiamondSparkles(){
  stopDiamondSparkles();
  createDiamondSparkles(18);
  sparkleTimer=setInterval(()=>createDiamondSparkles(7),520);
}
function stopDiamondSparkles(){
  if(sparkleTimer)clearInterval(sparkleTimer);
  sparkleTimer=null;
  document.querySelectorAll(".sparkle").forEach(s=>s.remove());
}
function createDiamondSparkles(count){
  for(let i=0;i<count;i++){
    const s=document.createElement("i");
    s.className="sparkle";
    s.style.left=98+Math.random()*104+"px";
    s.style.top=176+Math.random()*104+"px";
    s.style.setProperty("--x",(Math.random()*96-48)+"px");
    s.style.setProperty("--y",(-28-Math.random()*70)+"px");
    document.querySelector(".popup").appendChild(s);
    setTimeout(()=>s.remove(),1050);
  }
}
function toast(text){toastEl.textContent=text;toastEl.classList.add("show");clearTimeout(window.toastTimer);window.toastTimer=setTimeout(()=>toastEl.classList.remove("show"),1700)}
rockZone.addEventListener("click",hit);
adMore.addEventListener("click",()=>{state.remaining=5;state.opened=5;toast("광고 시청 완료, 보석 5개 추가");render()});
document.getElementById("checkinBtn").addEventListener("click",()=>toast("출석체크 완료"));
document.getElementById("boxBtn").addEventListener("click",()=>collection.classList.add("show"));
document.getElementById("closeCollection").addEventListener("click",()=>collection.classList.remove("show"));
rewardBtn.addEventListener("click",closePopup);
popupClose.addEventListener("click",dismissPopup);
diamondWrap.addEventListener("pointerdown",e=>{diamondWrap.setPointerCapture(e.pointerId);diamondWrap.classList.add("dragging")});
diamondWrap.addEventListener("pointermove",e=>{if(!diamondWrap.classList.contains("dragging"))return;const r=diamondWrap.getBoundingClientRect();const x=(e.clientX-r.left)/r.width-.5;const y=(e.clientY-r.top)/r.height-.5;diamondWrap.style.transform=`rotateX(${-y*18}deg) rotateY(${x*18}deg) scale(1.04)`});
diamondWrap.addEventListener("pointerup",e=>{diamondWrap.releasePointerCapture(e.pointerId);diamondWrap.classList.remove("dragging");diamondWrap.style.transform=""});
diamondWrap.addEventListener("pointercancel",()=>{diamondWrap.classList.remove("dragging");diamondWrap.style.transform=""});
render();
</script>
</body>
</html>
